<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="烈酒云" name="description">
    <title>烈酒云</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Poppins:wght@400;600&display=swap"
          rel="stylesheet">
    <style>
        /* 定义全局变量 (液态玻璃风格) */
        :root {
            /* 亮色模式背景色 */
            --bg-liquid-1: #c3e2f7;
            --bg-liquid-2: #e0f2f7;
            --bg-liquid-3: #f0e6fa;
            --liquid-glass-bg: rgba(255, 255, 255, 0.35);
            --liquid-glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --card-shadow: 0 15px 50px rgba(31, 38, 135, 0.12);
            --btn-bg: linear-gradient(135deg, #7c99e4 0%, #a7c1ed 100%);
            --btn-hover-shadow: 0 10px 30px rgba(124, 153, 228, 0.35);
            --line-color: rgba(45, 52, 54, 0.08);
            --visualizer-color: #2d3436;
            --particle-color: 45, 52, 54;
        }

        /* 暗黑模式变量 */
        body.dark-mode {
            --bg-liquid-1: #0f1c2b;
            --bg-liquid-2: #1a2a3a;
            --bg-liquid-3: #223545;
            --liquid-glass-bg: rgba(20, 20, 30, 0.55);
            --liquid-glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --text-main: #e0e7eb;
            --text-sub: #b2bec3;
            --card-shadow: 0 15px 50px rgba(0, 0, 0, 0.45);
            --btn-bg: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            --btn-hover-shadow: 0 10px 30px rgba(75, 108, 183, 0.35);
            --line-color: rgba(224, 231, 235, 0.08);
            --visualizer-color: #e0e7eb;
            --particle-color: 224, 231, 235;
        }

        /* 基础样式 */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, var(--bg-liquid-1), var(--bg-liquid-2), var(--bg-liquid-3), var(--bg-liquid-1));
            background-size: 400% 400%;
            animation: liquidGradientBG 30s ease infinite;
            color: var(--text-main);
            overflow: hidden;
            transition: color 0.8s ease;
            perspective: 1000px;
        }

        @keyframes liquidGradientBG {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        #interactive-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .liquid-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .liquid-particle {
            position: absolute;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.12), transparent);
            border-radius: 50%;
            animation: floatAndFade 30s ease-in-out infinite;
            filter: blur(8px);
        }

        @keyframes floatAndFade {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) translateX(30vw) scale(2);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            padding: 45px 35px;
            background: var(--liquid-glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: var(--liquid-glass-border);
            border-radius: 35px;
            box-shadow: var(--card-shadow);
            text-align: center;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            animation: liquidPopIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transform-style: preserve-3d;
            transition: box-shadow 0.8s, background 0.8s;
            will-change: transform;
            user-select: none;
            contain: layout style paint;
        }

        @keyframes liquidPopIn {
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.25);
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.5s;
        }

        .avatar-wrapper:hover .avatar {
            transform: rotate(360deg) scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .status-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #2ecc71;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.6);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(46, 204, 113, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(46, 204, 113, 0);
            }
        }

        h1 {
            font-size: 2.2em;
            margin: 10px 0;
            letter-spacing: 1.5px;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        h1:hover::before,
        h1:hover::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--liquid-glass-bg);
            opacity: 0.8;
        }

        h1:hover::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch-anim 0.3s infinite linear alternate-reverse;
        }

        h1:hover::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            animation: glitch-anim2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            20% { clip-path: polygon(0 30%, 100% 30%, 100% 40%, 0 40%); }
            40% { clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); }
            60% { clip-path: polygon(0 70%, 100% 70%, 100% 80%, 0 80%); }
            80% { clip-path: polygon(0 90%, 100% 90%, 100% 100%, 0 100%); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%); }
        }

        @keyframes glitch-anim2 {
            0% { clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%); }
            20% { clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); }
            40% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); }
            60% { clip-path: polygon(0 60%, 100% 60%, 100% 70%, 0 70%); }
            80% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); }
            100% { clip-path: polygon(0 100%, 100% 100%, 100% 0, 0 0); }
        }

        .bio {
            color: var(--text-sub);
            font-size: 1.1em;
            margin-bottom: 35px;
            min-height: 1.5em;
            font-weight: 400;
            line-height: 1.6;
        }

        .link-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: translateZ(20px);
        }

        .link-item {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1em;
            letter-spacing: 0.8px;
            background: var(--btn-bg);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s, opacity 0.6s;
            will-change: transform;
            opacity: 1;
            transform: translateY(0);
            contain: layout style paint;
        }

        .link-item.animate-in {
            animation: slideUpLiquid 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideUpLiquid {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-item:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--btn-hover-shadow);
        }

        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: none;
            opacity: 0;
        }

        .link-item:hover::after {
            left: 100%;
            transition: left 0.8s ease;
            opacity: 1;
        }

        .footer {
            margin-top: 45px;
            font-size: 0.9em;
            color: var(--text-sub);
            opacity: 0.6;
            transition: opacity 0.5s;
            transform: translateZ(10px);
        }

        .footer:hover {
            opacity: 1;
        }

        .mouse-trail {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            animation: trailFadeInScale 0.6s forwards;
        }

        @keyframes trailFadeInScale {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        /* 按钮群组样式 */
        .controls-group {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            background: var(--liquid-glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            font-size: 1.3em;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .control-btn:hover {
            transform: scale(1.15);
            background: rgba(255, 255, 255, 0.6);
        }

        /* 摄像头开启时的指示灯 */
        .camera-active::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            border: 2px solid #fff;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* 摄像头预览窗口（默认隐藏） */
        #webcam-preview {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 160px;
            height: 120px;
            border-radius: 15px;
            overflow: hidden;
            z-index: 90;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
            background: #000;
        }

        #webcam-preview.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像翻转 */
        }

        /* 手势状态提示 */
        #gesture-status {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 0;
        }

        /* 手势骨骼Canvas */
        #gesture-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            pointer-events: none;
            display: none;
        }

        #gesture-canvas.active {
            display: block;
        }

        .falling-emoji {
            position: fixed;
            top: -60px;
            font-size: 26px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
            animation: fallLiquid linear forwards;
            filter: blur(0.5px);
        }

        @keyframes fallLiquid {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-anim 0.8s linear;
            pointer-events: none;
            z-index: 9998;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(6);
                opacity: 0;
            }
        }

        .music-control-group {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            z-index: 100;
        }

        .music-player {
            width: 50px;
            height: 50px;
            background: var(--liquid-glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .music-player:hover {
            transform: scale(1.1);
        }

        .music-disc {
            font-size: 24px;
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        .music-player.playing .music-disc {
            animation-play-state: running;
        }

        .music-player.playing {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .music-visualizer {
            display: flex;
            gap: 4px;
            height: 25px;
            align-items: flex-end;
            margin-bottom: 10px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .music-visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: var(--visualizer-color);
            border-radius: 2px;
            height: 4px;
            transition: background-color 0.8s;
        }

        .music-visualizer.active .bar:nth-child(1) {
            animation: sound 0.8s infinite ease-in-out alternate;
        }

        .music-visualizer.active .bar:nth-child(2) {
            animation: sound 0.9s infinite ease-in-out alternate -0.4s;
        }

        .music-visualizer.active .bar:nth-child(3) {
            animation: sound 1.1s infinite ease-in-out alternate -0.2s;
        }

        .music-visualizer.active .bar:nth-child(4) {
            animation: sound 0.7s infinite ease-in-out alternate -0.6s;
        }

        @keyframes sound {
            0% { height: 4px; }
            100% { height: 24px; }
        }

        .beian-container {
            margin-top: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .beian-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: color 0.3s, transform 0.3s;
        }

        .beian-link:hover {
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .beian-icon {
            width: 16px;
            height: 16px;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* 加载提示 */
        #loading-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--liquid-glass-bg);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 20px;
            border: var(--liquid-glass-border);
            box-shadow: var(--card-shadow);
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-weight: 600;
        }

        #loading-toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                display: block;
                height: auto;
                padding: 40px 0;
            }

            .container {
                padding: 35px 25px;
                width: 90%;
                margin: 0 auto;
            }

            h1 {
                font-size: 2em;
            }

            .mouse-trail {
                display: none;
            }

            #webcam-preview {
                display: none;
            }

            .controls-group {
                top: 15px;
                right: 15px;
            }

            .music-control-group {
                bottom: 15px;
                left: 15px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
            .music-visualizer { display: none !important; }
        }
    
        /* 控件初始显示 */
        .controls-group,
        .music-control-group {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .controls-group:hover,
        .music-control-group:hover {
            opacity: 1;
        }

        /* 确保按钮可见 */
        .control-btn {
            opacity: 1;
            transform: scale(1);
        }

        .music-player {
            opacity: 1;
            transform: scale(1);
        }
</style>
<base target="_blank">
</head>
<body>

<canvas id="interactive-lines"></canvas>

<canvas id="gesture-canvas"></canvas>

<div class="liquid-particles" id="liquid-particles-container"></div>

<div id="loading-toast">加载中...</div>

<div class="controls-group">
    <div class="control-btn" id="camera-toggle" title="开启手势控制">📷</div>
    <div class="control-btn" id="theme-toggle" title="切换主题">☀️</div>
</div>

<div class="music-control-group">
    <div class="music-player" id="music-player" title="点击播放/暂停">
        <div class="music-disc">🎵</div>
        <audio id="bg-music" loop>
            <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
        </audio>
    </div>
    <div class="music-visualizer" id="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
</div>

<div id="webcam-preview">
    <video id="webcam-video" playsinline></video>
    <div id="gesture-status">等待开启...</div>
</div>

<div class="container">
    <header>
        <div class="avatar-wrapper">
            <img alt="Avatar" class="avatar" id="avatar-img" src="avatar.png">
            <div class="status-badge"></div>
        </div>

        <h1 data-text="烈酒">烈酒</h1>

        <p class="bio" id="typing-text"></p>
    </header>

    <section class="link-section">
        <a class="link-item" href="https://github.com/lie-jiu" target="_blank" rel="noopener noreferrer" style="animation-delay: 0.1s"><span>💻 GitHub</span></a>
        <a class="link-item" href="https://oj.liejiu.top" target="_blank" rel="noopener noreferrer" style="animation-delay: 0.2s"><span>🎈 在线评测</span></a>
        <a class="link-item" href="https://blog.liejiu.top" target="_blank" rel="noopener noreferrer" style="animation-delay: 0.3s"><span>📝 个人博客</span></a>
        <a class="link-item" href="mailto:liejiunb666@gmail.com" target="_blank" rel="noopener noreferrer" style="animation-delay: 0.4s"><span>📧 发送邮件</span></a>
    </section>

    <footer class="footer">
        <div>© 2025 Made with ❤️ by LieJiu</div>

        <div class="beian-container">
            <a class="beian-link" href="https://beian.mps.gov.cn/#/query/webSearch?code=36110402000194" rel="noreferrer noopener"
               target="_blank">
                <img alt="公安备案图标" class="beian-icon" src="https://beian.mps.gov.cn/favicon.ico">
                赣公网安备36110402000194号
            </a>
            <a class="beian-link" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">
                赣ICP备2025076709号-1
            </a>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
    // 配置参数
    const config = {
        githubUsername: "lie-jiu",
        typingText: "孤岛未相逢",
        typingSpeed: 150,
        liquidEmojis: ['💧', '✨', '🫧', '💎', '🐳', '🪁', '❄️', '🌊'],
        numParticles: 12
    };

    // 全局状态管理
    const state = {
        isGestureActive: false,
        isPinching: false,
        currentRotateX: 0,
        currentRotateY: 0,
        currentTranslateX: 0,
        currentTranslateY: 0,
        currentScale: 1,
        pinchStartX: 0,
        pinchStartY: 0,
        cardStartX: 0,
        cardStartY: 0,
        refHandSize: 0,
        refCardScale: 1,
        camera: null,
        hands: null,
        isMusicPlaying: false
    };

    // DOM 元素缓存
    const elements = {
        container: document.querySelector('.container'),
        typingElement: document.getElementById('typing-text'),
        toggleBtn: document.getElementById('theme-toggle'),
        body: document.body,
        cameraToggleBtn: document.getElementById('camera-toggle'),
        videoElement: document.getElementById('webcam-video'),
        webcamPreview: document.getElementById('webcam-preview'),
        gestureStatus: document.getElementById('gesture-status'),
        gestureCanvas: document.getElementById('gesture-canvas'),
        gestureCtx: document.getElementById('gesture-canvas').getContext('2d'),
        loadingToast: document.getElementById('loading-toast'),
        musicPlayer: document.getElementById('music-player'),
        bgMusic: document.getElementById('bg-music'),
        visualizer: document.getElementById('visualizer')
    };

    // 工具函数：显示加载提示
    function showLoading(text) {
        elements.loadingToast.textContent = text;
        elements.loadingToast.classList.add('show');
    }

    function hideLoading() {
        elements.loadingToast.classList.remove('show');
    }

    // 工具函数：防抖
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    // 打字机效果
    function typeWriter() {
        let charIndex = 0;
        function type() {
            if (charIndex < config.typingText.length) {
                elements.typingElement.textContent += config.typingText.charAt(charIndex);
                charIndex++;
                setTimeout(type, config.typingSpeed);
            }
        }
        type();
    }

    // 主题切换
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            elements.body.classList.add('dark-mode');
            elements.toggleBtn.textContent = '🌙';
        }

        elements.toggleBtn.addEventListener('click', () => {
            elements.body.classList.toggle('dark-mode');
            const isDark = elements.body.classList.contains('dark-mode');
            elements.toggleBtn.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    }

    // 随机飘落的Emoji
    function initFallingEmojis() {
        function createEmoji() {
            const emoji = document.createElement('div');
            emoji.className = 'falling-emoji';
            emoji.innerText = config.liquidEmojis[Math.floor(Math.random() * config.liquidEmojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (Math.random() * 7 + 8) + 's';
            emoji.style.opacity = Math.random() * 0.3 + 0.1;
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 15000);
        }

        let emojiInterval = setInterval(createEmoji, 800);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(emojiInterval);
            } else {
                emojiInterval = setInterval(createEmoji, 800);
            }
        });
    }

    // 背景粒子效果
    function initBackgroundParticles() {
        const particlesContainer = document.getElementById('liquid-particles-container');

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'liquid-particle';
            const size = Math.random() * 100 + 50;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100 + 100}vh`;
            particle.style.animationDelay = `${Math.random() * 10}s`;
            particle.style.animationDuration = `${Math.random() * 20 + 25}s`;
            particlesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), 50000);
        }

        for (let i = 0; i < config.numParticles; i++) {
            createParticle();
        }
    }

    // 3D 视差效果
    function initParallax() {
        setTimeout(() => {
            elements.container.style.opacity = '1';
            elements.container.style.transform = 'translateY(0) scale(1)';
            elements.container.style.animation = 'none';

            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    if (state.isGestureActive) return;

                    const sensitivity = 25;
                    const xAxis = (window.innerWidth / 2 - e.pageX) / sensitivity;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / sensitivity;

                    state.currentRotateY = -xAxis;
                    state.currentRotateX = yAxis;

                    updateContainerTransform();
                });

                document.addEventListener('mouseleave', () => {
                    if (state.isGestureActive) return;
                    state.currentRotateY = 0;
                    state.currentRotateX = 0;
                    updateContainerTransform();
                });

                document.addEventListener('mouseenter', () => {
                    if (state.isGestureActive) return;
                    elements.container.style.transition = 'transform 0.1s ease-out';
                });
            }
        }, 1500);
    }

    // 统一更新 Transform
    function updateContainerTransform() {
        elements.container.style.transform = `
            translate(${state.currentTranslateX}px, ${state.currentTranslateY}px)
            rotateY(${state.currentRotateY}deg)
            rotateX(${state.currentRotateX}deg)
            scale(${state.currentScale})
        `;
    }

    // 点击波纹效果
    function initRippleEffect() {
        document.addEventListener('click', function (e) {
            if (e.target.closest('.music-player') || e.target.closest('a') || e.target.closest('.control-btn')) return;

            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            document.body.appendChild(ripple);

            const size = 120;
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = e.clientX - size / 2 + 'px';
            ripple.style.top = e.clientY - size / 2 + 'px';

            setTimeout(() => ripple.remove(), 800);
        });
    }

    // 音乐播放器控制
    function initMusicPlayer() {
        elements.musicPlayer.addEventListener('click', async () => {
            try {
                if (elements.bgMusic.paused) {
                    await elements.bgMusic.play();
                    elements.musicPlayer.classList.add('playing');
                    elements.visualizer.classList.add('active');
                    state.isMusicPlaying = true;
                } else {
                    elements.bgMusic.pause();
                    elements.musicPlayer.classList.remove('playing');
                    elements.visualizer.classList.remove('active');
                    state.isMusicPlaying = false;
                }
            } catch (error) {
                console.error("音乐播放失败:", error);
                showLoading("请点击页面任意位置后再播放音乐");
                setTimeout(hideLoading, 2000);
            }
        });

        // 处理自动播放被阻止的情况
        elements.bgMusic.addEventListener('play', () => {
            elements.musicPlayer.classList.add('playing');
            elements.visualizer.classList.add('active');
        });

        elements.bgMusic.addEventListener('pause', () => {
            elements.musicPlayer.classList.remove('playing');
            elements.visualizer.classList.remove('active');
        });

        elements.bgMusic.addEventListener('error', (e) => {
            console.error("音频加载错误:", e);
            showLoading("音频加载失败");
            setTimeout(hideLoading, 2000);
        });
    }

    // 交互式线条背景（使用CSS变量动态颜色）
    function initParticleNetwork() {
        const canvas = document.getElementById('interactive-lines');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        let mouse = { x: null, y: null, radius: 150 };
        let animationId;

        const resizeCanvas = debounce(() => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }, 200);

        window.addEventListener('resize', resizeCanvas);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                // 使用CSS变量获取颜色
                const isDark = elements.body.classList.contains('dark-mode');
                const rgb = getComputedStyle(elements.body).getPropertyValue('--particle-color').trim();
                ctx.fillStyle = `rgba(${rgb}, 0.15)`;
                ctx.fill();
            }

            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 5;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 5;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 5;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 5;
                    }
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = Math.min(100, (canvas.height * canvas.width) / 9000);
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 3) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;

                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        function connect() {
            const isDark = elements.body.classList.contains('dark-mode');
            const rgb = getComputedStyle(elements.body).getPropertyValue('--particle-color').trim();

            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a + 1; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distanceSquared = dx * dx + dy * dy;

                    if (distanceSquared < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distanceSquared / 20000);
                        ctx.strokeStyle = `rgba(${rgb}, ${opacityValue * 0.15})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        initParticles();
        animate();

        // 清理函数
        window.addEventListener('beforeunload', () => {
            cancelAnimationFrame(animationId);
        });
    }

    // 按钮吸附效果
    function initMagneticButtons() {
        const buttons = document.querySelectorAll('.link-item');
        buttons.forEach(btn => {
            const span = btn.querySelector('span');

            btn.addEventListener('mousemove', (e) => {
                if (window.innerWidth <= 768) return;
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.animation = 'none';
                btn.style.opacity = '1';
                const strength = 0.15;
                const moveX = x * strength;
                const moveY = y * strength - 6;
                btn.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s';
                btn.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.02)`;
                if (span) {
                    span.style.transition = 'transform 0.1s ease-out';
                    span.style.transform = `translate(${x * 0.08}px, ${y * 0.08}px)`;
                }
            });

            btn.addEventListener('mouseleave', () => {
                btn.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.6s';
                btn.style.transform = '';
                if (span) {
                    span.style.transition = 'transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    span.style.transform = '';
                }
            });
        });
    }

    // -----------------------------------------------------------
    // 单手手势控制逻辑 (MediaPipe Hands)
    // -----------------------------------------------------------

    function resizeGestureCanvas() {
        elements.gestureCanvas.width = window.innerWidth;
        elements.gestureCanvas.height = window.innerHeight;
    }

    function mapCursor(value) {
        const minRange = 0.2;
        const maxRange = 0.8;
        let normalized = (value - minRange) / (maxRange - minRange);
        return Math.max(0, Math.min(1, normalized));
    }

    function isHandPinching(landmarks) {
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];
        const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        return distance < 0.05;
    }

    function getHandSize(landmarks) {
        const wrist = landmarks[0];
        const middleMCP = landmarks[9];
        return Math.hypot(wrist.x - middleMCP.x, wrist.y - middleMCP.y);
    }

    function onGestureResults(results) {
        if (!state.isGestureActive) return;

        // 防御性检查：确保Canvas尺寸正确
        if (elements.gestureCanvas.width !== window.innerWidth || 
            elements.gestureCanvas.height !== window.innerHeight) {
            resizeGestureCanvas();
        }

        elements.gestureCtx.save();
        elements.gestureCtx.setTransform(1, 0, 0, 1, 0, 0);
        elements.gestureCtx.clearRect(0, 0, elements.gestureCanvas.width, elements.gestureCanvas.height);

        let skeletonScale = 1;

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const hand = results.multiHandLandmarks[0];

            const indexTip = hand[8];
            const palmCenter = hand[9];

            const rawX = 1 - indexTip.x;
            const rawY = indexTip.y;
            const cursorX = mapCursor(rawX) * window.innerWidth;
            const cursorY = mapCursor(rawY) * window.innerHeight;

            const isCurrentlyPinching = isHandPinching(hand);
            const currentHandSize = getHandSize(hand);

            if (!isCurrentlyPinching) {
                state.isPinching = false;
                elements.container.style.cursor = 'default';

                // 视差悬停
                const x = (0.5 - palmCenter.x) * 2;
                const y = (0.5 - palmCenter.y) * 2;
                state.currentRotateY = x * 15;
                state.currentRotateX = y * 15;
                elements.gestureStatus.innerText = "🖐️ 张开: 悬停 / 移动视角";

            } else {
                // 捏合模式
                if (!state.isPinching) {
                    state.isPinching = true;
                    state.pinchStartX = cursorX;
                    state.pinchStartY = cursorY;
                    state.cardStartX = state.currentTranslateX;
                    state.cardStartY = state.currentTranslateY;
                    state.refHandSize = currentHandSize;
                    state.refCardScale = state.currentScale;
                }

                // 拖拽
                const deltaX = cursorX - state.pinchStartX;
                const deltaY = cursorY - state.pinchStartY;
                state.currentTranslateX = state.cardStartX + deltaX;
                state.currentTranslateY = state.cardStartY + deltaY;

                // 缩放卡片
                if (state.refHandSize > 0) {
                    const ratio = currentHandSize / state.refHandSize;
                    let newScale = state.refCardScale / ratio;
                    newScale = Math.max(0.4, Math.min(newScale, 1.8));
                    state.currentScale = newScale;
                    skeletonScale = Math.pow(1 / ratio, 2.2);
                }

                elements.gestureStatus.innerText = "🤏 捏合: 移动 + 前推缩小/后拉放大";
                elements.container.style.cursor = 'grabbing';
            }

            // 绘制骨骼
            elements.gestureCtx.translate(elements.gestureCanvas.width, 0);
            elements.gestureCtx.scale(-1, 1);

            if (state.isPinching && skeletonScale !== 1) {
                const centerX = hand[9].x * elements.gestureCanvas.width;
                const centerY = hand[9].y * elements.gestureCanvas.height;

                elements.gestureCtx.translate(centerX, centerY);
                elements.gestureCtx.scale(skeletonScale, skeletonScale);
                elements.gestureCtx.translate(-centerX, -centerY);
            }

            drawConnectors(elements.gestureCtx, hand, HAND_CONNECTIONS, {
                color: state.isPinching ? '#00d2ff' : 'rgba(255, 255, 255, 0.8)',
                lineWidth: 3
            });
            drawLandmarks(elements.gestureCtx, hand, {
                color: state.isPinching ? '#ffffff' : '#7c99e4',
                lineWidth: 1,
                radius: 3
            });

            elements.gestureCtx.restore();

        } else {
            elements.gestureCtx.restore();
            elements.gestureStatus.innerText = "未检测到手部";
            state.isPinching = false;
        }

        updateContainerTransform();
    }

    async function startCamera() {
        showLoading("正在启动摄像头...");

        try {
            if (!state.hands) {
                elements.gestureStatus.innerText = "加载模型中...";
                state.hands = new Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});

                state.hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                state.hands.onResults(onGestureResults);
            }

            if (!state.camera) {
                state.camera = new Camera(elements.videoElement, {
                    onFrame: async () => {
                        await state.hands.send({image: elements.videoElement});
                    },
                    width: 320,
                    height: 240
                });
            }

            await state.camera.start();
            state.isGestureActive = true;
            elements.cameraToggleBtn.classList.add('camera-active');
            elements.webcamPreview.classList.add('show');
            elements.gestureCanvas.classList.add('active');
            elements.gestureStatus.innerText = "摄像头已启动";
            elements.container.style.transition = 'transform 0.05s linear, box-shadow 0.8s, background 0.8s';

            hideLoading();
        } catch (error) {
            console.error("Camera start failed:", error);
            hideLoading();
            showLoading("无法访问摄像头，请检查权限");
            setTimeout(hideLoading, 3000);
            elements.gestureStatus.innerText = "启动失败";

            // 清理资源
            if (state.camera) {
                state.camera = null;
            }
        }
    }

    function stopCamera() {
        if (state.camera) {
            state.camera.stop();
            state.camera = null;
        }
        state.isGestureActive = false;
        state.isPinching = false;
        elements.cameraToggleBtn.classList.remove('camera-active');
        elements.webcamPreview.classList.remove('show');
        elements.gestureCanvas.classList.remove('active');
        elements.gestureCtx.clearRect(0, 0, elements.gestureCanvas.width, elements.gestureCanvas.height);

        // 恢复原有状态
        state.currentTranslateX = 0;
        state.currentTranslateY = 0;
        state.currentRotateX = 0;
        state.currentRotateY = 0;
        state.currentScale = 1;

        elements.container.style.transition = 'transform 0.5s ease-out, box-shadow 0.8s, background 0.8s';
        updateContainerTransform();
        elements.gestureStatus.innerText = "等待开启...";
    }

    function initGestureControl() {
        window.addEventListener('resize', debounce(resizeGestureCanvas, 100));
        resizeGestureCanvas();

        elements.cameraToggleBtn.addEventListener('click', () => {
            if (!state.isGestureActive) {
                startCamera();
            } else {
                stopCamera();
            }
        });
    }

    // 初始化所有功能
    function init() {
        window.onload = () => {
            setTimeout(typeWriter, 1200);
        };

        initTheme();
        initFallingEmojis();
        initBackgroundParticles();
        initParallax();
        initRippleEffect();
        initMusicPlayer();
        initParticleNetwork();
        initMagneticButtons();
        initGestureControl();
    }

    // 启动
    init();
</script>
</body>
